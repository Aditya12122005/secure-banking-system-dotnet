version: '3.9'

services:

  banking-api:
    build:
      context: .
      dockerfile: Banking.API/Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=SecureBankingDB;Username=postgres;Password=postgres123
      - Redis__ConnectionString=redis:6379

  postgres:
    image: postgres:latest

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: SecureBankingDB

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

    ports:
      - "6379:6379"

volumes:
  postgres_data: